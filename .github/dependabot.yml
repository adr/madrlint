version: 2
updates:
  # Java / Gradle dependencies (inline versions in build.gradle.kts,
  # the version catalog in gradle/libs.versions.toml, and Gradle plugins).
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Bundle all minor/patch bumps into a single PR so they can be
      # reviewed and auto-merged together. Major bumps stay separate.
      gradle-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Versions of the actions used in the workflows below.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
